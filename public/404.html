<!DOCTYPE html>
<html>
  <head>
    <script>
      // GitHub Pages SPA redirect: preserve the path through a 404
      const path = window.location.pathname + window.location.search
      window.location.replace(
        window.location.origin + '/cheat-sheet-manager/?redirect=' + encodeURIComponent(path)
      )
    </script>
  </head>
</html>
